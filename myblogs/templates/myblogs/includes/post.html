{% extends "base.html" %}

{% load static %}

{%  block pageStyles %}
    <link rel="stylesheet" href="{% static 'myblogs/css/post.css'%}"/>
{% endblock %}

{% block pageTitle %}
    {{ pageTitle }} Page
{% endblock %}

{% block pageContent %}
    <li>
        <article class="post">
            <a href="{% url 'posts-details' post.slug %}">
                <img src="{{ post.imageUrl.url }}" alt="{{ post.title}}"/>
                <div class="post__content">
                    <h4>{{ post.title }}</h4>
                    <p>{{ post.excerpt}}</p>
                </div>
            </a>
        </article>
    </li>
{% endblock %}
